<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - PhishGuard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.1), transparent 40%);
        }
        
        .auth-box {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .auth-toggle {
            display: flex;
            background: var(--bg-main);
            border-radius: 12px;
            padding: 0.3rem;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--bg-secondary);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form .btn-primary {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
            </svg>
            PhishGuard
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-box animate-up">
            <div class="auth-header">
                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Enter your credentials to access your dashboard.</p>
            </div>

            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="switchTab('login')">Login</button>
                <button class="toggle-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder=" " required>
                    <label for="loginUsername">Username</label>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder=" " required>
                    <label for="loginPassword">Password</label>
                </div>
                <button type="submit" class="btn-primary">Sign In <i class="fas fa-sign-in-alt" style="margin-left:8px;"></i></button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <input type="text" id="signupName" placeholder=" " required>
                    <label for="signupName">Full Name</label>
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" placeholder=" " required>
                    <label for="signupEmail">Email Address</label>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder=" " required>
                    <label for="signupPassword">Create Password</label>
                </div>
                <button type="submit" class="btn-primary">Create Account <i class="fas fa-user-plus" style="margin-left:8px;"></i></button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelector('.toggle-btn:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('authTitle').innerText = 'Welcome Back';
                document.getElementById('authSubtitle').innerText = 'Enter your credentials to access your dashboard.';
            } else {
                document.querySelector('.toggle-btn:nth-child(2)').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
                document.getElementById('authTitle').innerText = 'Create Account';
                document.getElementById('authSubtitle').innerText = 'Join PhishGuard to secure your digital life.';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('isAuthenticated', 'true');
            localStorage.setItem('username', document.getElementById('loginUsername').value);
            window.location.href = 'dashboard.html';
        }

        function handleSignup(e) {
            e.preventDefault();
            localStorage.setItem('isAuthenticated', 'true');
            localStorage.setItem('username', document.getElementById('signupName').value);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
